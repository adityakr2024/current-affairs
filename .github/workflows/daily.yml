name: The Currents — Daily Pipeline

on:
  schedule:
    # 6:00 AM IST = 00:30 UTC
    # GitHub Actions queue adds ~10–20 min, so target 00:10 UTC → arrives ~6:20 AM IST
    - cron: "10 0 * * 1-6"   # Mon–Sat, 00:10 UTC = ~6:10 AM IST (queue-adjusted)
  workflow_dispatch:           # Manual trigger from GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Python ────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── 3. System packages ───────────────────────────────────────────────────
      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            wkhtmltopdf \
            fonts-liberation \
            fonts-noto-core \
            fonts-noto-cjk \
            fonts-noto

      # ── 4. Playwright (for social post image generation) ─────────────────────
      - name: Install Playwright browser
        run: python -m playwright install chromium --with-deps

      # ── 5. Run pipeline ──────────────────────────────────────────────────────
      - name: Run pipeline
        env:
          # ── AI Providers ────────────────────────────────────────────────────
          GROQ_API_KEY_1:       ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2:       ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3:       ${{ secrets.GROQ_API_KEY_3 }}
          GROQ_API_KEY_4:       ${{ secrets.GROQ_API_KEY_4 }}
          GEMINI_API_KEY_1:     ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2:     ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3:     ${{ secrets.GEMINI_API_KEY_3 }}
          OPENAI_API_KEY_1:     ${{ secrets.OPENAI_API_KEY_1 }}
          OPENAI_API_KEY_2:     ${{ secrets.OPENAI_API_KEY_2 }}
          OPENAI_API_KEY_3:     ${{ secrets.OPENAI_API_KEY_3 }}
          OPENROUTER_API_KEY_1: ${{ secrets.OPENROUTER_API_KEY_1 }}
          OPENROUTER_API_KEY_2: ${{ secrets.OPENROUTER_API_KEY_2 }}
          CEREBRAS_API_KEY_1:   ${{ secrets.CEREBRAS_API_KEY_1 }}
          ANTHROPIC_API_KEY_1:  ${{ secrets.ANTHROPIC_API_KEY_1 }}
          # ── Delivery ────────────────────────────────────────────────────────
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_SENDER:         ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD:   ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_RECIPIENT:      ${{ secrets.GMAIL_RECIPIENT }}
          # ── Path config ─────────────────────────────────────────────────────
          SITE_URL:   https://adityakr2024.github.io/current-affairs/
          OUTPUT_DIR: /tmp/the_currents
        run: python main.py

      # ── 6. Commit persistent data back to main ───────────────────────────────
      # Commits three things that OutputManager writes to the repo:
      #   data/YYYY-MM.json          — today's articles
      #   data/metrics_history.jsonl — appended metrics line
      #   pdfs/YYYY-MM/*.pdf         — today's PDFs
      - name: Commit persistent data to main
        if: always()
        run: |
          DATE=$(date +%Y-%m-%d)
          git config user.name  "The Currents Bot"
          git config user.email "bot@thecurrents.in"
          git add data/ pdfs/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "data: ${DATE} — articles + metrics"
          git push origin main || echo "⚠ Push to main failed (non-fatal)"

      # ── 7. Deploy web page + PDFs + social images to GitHub Pages ────────────
      # Three content types are merged into gh-pages:
      #   index.html          — today's web page (from /tmp/the_currents/web/)
      #   pdfs/YYYY-MM/*.pdf  — PDF archive (merged from repo/pdfs/ + today)
      #   social/YYYY-MM/*.jpg — social images (new: for OG preview links)
      - name: Deploy to GitHub Pages
        if: always()
        run: |
          DATE=$(date +%Y-%m-%d)
          MONTH=$(date +%Y-%m)

          if [ ! -f /tmp/the_currents/web/index.html ]; then
            echo "⚠ Web output not found — skipping Pages deploy"
            exit 0
          fi

          git config user.name  "The Currents Bot"
          git config user.email "bot@thecurrents.in"

          # ── Build a clean staging directory for gh-pages ──────────────────
          STAGE=$(mktemp -d)

          # Copy web page
          cp /tmp/the_currents/web/index.html "${STAGE}/index.html"
          touch "${STAGE}/.nojekyll"
          echo "current-affairs.aarambhtimes.in" > "${STAGE}/CNAME"

          # Copy today's PDFs into staging
          mkdir -p "${STAGE}/pdfs/${MONTH}"
          cp /tmp/the_currents/pdf/TheCurrents_EN_${DATE}.pdf "${STAGE}/pdfs/${MONTH}/" 2>/dev/null || true
          cp /tmp/the_currents/pdf/TheCurrents_HI_${DATE}.pdf "${STAGE}/pdfs/${MONTH}/" 2>/dev/null || true

          # Copy social images into staging (OG preview images)
          if [ -d /tmp/the_currents/web/social ]; then
            mkdir -p "${STAGE}/social"
            cp -r /tmp/the_currents/web/social/. "${STAGE}/social/" 2>/dev/null || true
            echo "✅ Social images staged: $(find ${STAGE}/social -name '*.jpg' 2>/dev/null | wc -l) images"
          fi

          # ── Merge existing PDF + social archive from gh-pages ─────────────
          # We never overwrite old files — only add new ones.
          git fetch origin gh-pages 2>/dev/null || true
          if git ls-remote --heads origin gh-pages | grep -q gh-pages; then
            git checkout origin/gh-pages -- pdfs/ 2>/dev/null || true
            git checkout origin/gh-pages -- social/ 2>/dev/null || true
            if [ -d pdfs ];   then cp -rn pdfs/.   "${STAGE}/pdfs/"   2>/dev/null || true; fi
            if [ -d social ]; then cp -rn social/. "${STAGE}/social/" 2>/dev/null || true; fi
            git checkout HEAD -- . 2>/dev/null || true
          fi

          # ── Switch to gh-pages and deploy ─────────────────────────────────
          git fetch origin gh-pages 2>/dev/null || true
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages

          # Clear branch content (keep .git)
          git rm -rf . --quiet 2>/dev/null || true

          # Copy all staged files
          cp -r "${STAGE}/." .

          git add -A
          git diff --staged --quiet || git commit -m "The Currents — ${DATE}"
          git push origin gh-pages --force

          echo "✅ Deployed to gh-pages (web + PDFs + social images)"

      # ── 8. Save all outputs as downloadable artifact (30-day backup) ─────────
      # Catches everything in /tmp including logs, daily metrics JSON,
      # and any outputs that didn't make it into the repo commit.
      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: the-currents-${{ github.run_id }}
          path: /tmp/the_currents/
          retention-days: 30

      # ── 9. Alert on failure via Telegram ─────────────────────────────────────
      # Sends a Telegram message if ANY step above failed.
      # Requires TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID to be set.
      - name: Alert on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'EOF'
          import os, requests, datetime

          token   = os.environ.get("TELEGRAM_BOT_TOKEN", "")
          chat_id = os.environ.get("TELEGRAM_CHAT_ID", "")
          if not token or not chat_id:
              print("⚠ Telegram not configured — skipping failure alert")
              exit(0)

          run_id  = "${{ github.run_id }}"
          date    = datetime.date.today().isoformat()
          run_url = f"https://github.com/${{ github.repository }}/actions/runs/{run_id}"

          msg = (
              f"🚨 <b>Pipeline FAILED</b> — {date}\n\n"
              f"One or more stages failed in today's run.\n"
              f"<a href='{run_url}'>View Actions Log</a>\n\n"
              f"Run ID: <code>{run_id}</code>"
          )

          resp = requests.post(
              f"https://api.telegram.org/bot{token}/sendMessage",
              json={"chat_id": chat_id, "text": msg, "parse_mode": "HTML"},
              timeout=15,
          )
          print("Alert sent:", resp.status_code)
          EOF
